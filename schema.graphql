type Account @entity {
  "Account address"
  id: ID!
  transfersTo: [Transfer!] @derivedFrom(field: "to")
  transfersFrom: [Transfer!] @derivedFrom(field: "from")
  claims: [Claim!] @derivedFrom(field: "who")
  claimCreationsByOrigin: [ClaimCreation!] @derivedFrom(field: "originAccount")
}

type Transfer @entity {
  id: ID!
  blockNumber: Int! @index
  timestamp: DateTime! @index
  extrinsicHash: String @index
  from: Account!
  to: Account!
  amount: BigInt! @index
  fee: BigInt! # fee is calculated at the best effort and may be zero for some old extrinsics
}

type Extrinsic @entity {
  id: ID!
  blockHash: String! @index
  blockNumber: Int! @index
  hash: String! @index
  index: Int!
  success: Boolean! @index
  version: Int!
}

type ClaimCreation @entity {
  id: ID!
  blockNumber: Int! @index
  timestamp: DateTime! @index
  extrinsicHash: String @index
  originAccount: Account
  ethereumAccount: String! @index
  value: BigInt!
  vestingStart: BigInt
  vestingPeriod: BigInt
  vestingPerPeriod: BigInt
  statement: String @index
}

type Claim @entity {
  id: ID!
  blockNumber: Int! @index
  extrinsicHash: String @index
  who: Account!
  ethereumAccount: String! @index
  amount: BigInt!
  timestamp: DateTime! @index
}
